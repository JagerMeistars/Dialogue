name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile gen_dialogs.py
        run: python -m py_compile gen_dialogs.py

      - name: Validate JSON and pack.mcmeta
        run: python .github/validate.py
